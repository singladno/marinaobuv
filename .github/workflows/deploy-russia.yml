name: Deploy to Russian Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Run linting
        run: |
          cd web
          npm run lint

      - name: Run type checking
        run: |
          cd web
          npm run typecheck

      - name: Build application
        run: |
          cd web
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}

      - name: Deploy to Yandex Cloud
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.RUSSIAN_HOST }}
          username: ${{ secrets.RUSSIAN_USERNAME }}
          key: ${{ secrets.RUSSIAN_SSH_KEY }}
          port: ${{ secrets.RUSSIAN_SSH_PORT || 22 }}
          script: |
            # Navigate to project directory
            cd /var/www/marinaobuv

            # Pull latest changes
            git pull origin main

            # Stop existing containers
            docker-compose -f docker-compose.prod.yml down

            # Build and start new containers
            docker-compose -f docker-compose.prod.yml up -d --build

            # Run database migrations
            docker-compose -f docker-compose.prod.yml exec web npm run prisma:migrate

            # Restart nginx
            sudo systemctl reload nginx

            # Show running containers
            docker-compose -f docker-compose.prod.yml ps
