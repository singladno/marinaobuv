name: Test SSH Connection

on:
    workflow_dispatch:

jobs:
    test-ssh:
        runs-on: ubuntu-latest
        steps:
            - name: Test SSH connection
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.RUSSIAN_HOST }}
                  username: ubuntu
                  key: ${{ secrets.RUSSIAN_SSH_KEY }}
                  port: ${{ secrets.RUSSIAN_SSH_PORT || 22 }}
                  script: |
                      echo "SSH connection successful!"
                      whoami
                      pwd
