name: Setup HTTPS Only

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain name'
        required: true
        default: 'marina-obuv.ru'
        type: string
      email:
        description: 'Email for Let's Encrypt'
        required: true
        default: 'admin@marina-obuv.ru'
        type: string

jobs:
  setup-https:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}
        
    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        
    - name: Setup HTTPS
      run: |
        echo "🔒 Setting up HTTPS for ${{ github.event.inputs.domain }}..."
        
        # Create HTTPS setup script
        cat > setup-https.sh << 'EOF'
        #!/bin/bash
        set -e
        
        DOMAIN="${{ github.event.inputs.domain }}"
        EMAIL="${{ github.event.inputs.email }}"
        PROJECT_DIR="/var/www/marinaobuv"
        NGINX_DIR="/etc/nginx"
        SSL_DIR="/etc/ssl"
        
        echo "🌐 Setting up HTTPS for domain: $DOMAIN"
        echo "📧 Using email: $EMAIL"
        
        # 1. Install required packages
        echo "📦 Installing required packages..."
        sudo apt-get update
        sudo apt-get install -y nginx certbot python3-certbot-nginx openssl
        
        # 2. Create SSL directory structure
        echo "📁 Creating SSL directory structure..."
        sudo mkdir -p $SSL_DIR/certs
        sudo mkdir -p $SSL_DIR/private
        sudo chmod 755 $SSL_DIR/certs
        sudo chmod 700 $SSL_DIR/private
        
        # 3. Generate self-signed certificate for initial setup
        echo "🔐 Generating self-signed SSL certificate..."
        sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout $SSL_DIR/private/marinaobuv.ru.key \
            -out $SSL_DIR/certs/marinaobuv.ru.crt \
            -subj "/C=RU/ST=Moscow/L=Moscow/O=MarinaObuv/OU=IT/CN=$DOMAIN"
        
        sudo chmod 600 $SSL_DIR/private/marinaobuv.ru.key
        sudo chmod 644 $SSL_DIR/certs/marinaobuv.ru.crt
        
        # 4. Deploy nginx HTTPS configuration
        echo "⚙️ Deploying nginx HTTPS configuration..."
        sudo cp $PROJECT_DIR/nginx/conf.d/marinaobuv-https.conf $NGINX_DIR/sites-available/marinaobuv-https
        
        # Enable the site
        sudo ln -sf $NGINX_DIR/sites-available/marinaobuv-https $NGINX_DIR/sites-enabled/
        sudo rm -f $NGINX_DIR/sites-enabled/default
        
        # 5. Test nginx configuration
        echo "🧪 Testing nginx configuration..."
        if sudo nginx -t; then
          echo "✅ Nginx configuration is valid"
        else
          echo "❌ Nginx configuration test failed"
          exit 1
        fi
        
        # 6. Reload nginx
        echo "🔄 Reloading nginx..."
        sudo systemctl reload nginx
        
        # 7. Setup Let's Encrypt certificate
        echo "🔐 Setting up Let's Encrypt certificate..."
        sudo certbot --nginx -d $DOMAIN -d www.$DOMAIN --non-interactive --agree-tos --email $EMAIL
        
        # 8. Setup auto-renewal
        echo "🔄 Setting up certificate auto-renewal..."
        (sudo crontab -l 2>/dev/null | grep -v certbot; echo "0 12 * * * /usr/bin/certbot renew --quiet --post-hook 'systemctl reload nginx'") | sudo crontab -
        
        # 9. Configure firewall
        echo "🔥 Configuring firewall..."
        sudo ufw allow 22/tcp
        sudo ufw allow 80/tcp
        sudo ufw allow 443/tcp
        sudo ufw --force enable
        
        # 10. Test HTTPS
        echo "🧪 Testing HTTPS..."
        sleep 5
        if curl -k -s -o /dev/null -w "%{http_code}" https://localhost/health | grep -q "200"; then
          echo "✅ HTTPS is working correctly!"
        else
          echo "⚠️ HTTPS test failed, but configuration is set up"
        fi
        
        echo ""
        echo "🎉 HTTPS setup completed!"
        echo ""
        echo "Your site should now be accessible at:"
        echo "https://$DOMAIN"
        echo "https://www.$DOMAIN"
        echo ""
        echo "SSL Certificate: $SSL_DIR/certs/marinaobuv.ru.crt"
        echo "SSL Private Key: $SSL_DIR/private/marinaobuv.ru.key"
        EOF
        
        chmod +x setup-https.sh
        scp setup-https.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "sudo bash /tmp/setup-https.sh"
        
    - name: Verify HTTPS setup
      run: |
        echo "🔍 Verifying HTTPS setup..."
        sleep 10
        
        # Test HTTPS endpoint
        if curl -k -s -o /dev/null -w "%{http_code}" https://${{ github.event.inputs.domain }}/health | grep -q "200"; then
          echo "✅ HTTPS setup successful!"
        else
          echo "⚠️ HTTPS test failed, but setup completed"
        fi
        
        # Test HTTP redirect
        if curl -s -o /dev/null -w "%{http_code}" http://${{ github.event.inputs.domain }} | grep -q "301\|302"; then
          echo "✅ HTTP to HTTPS redirect working"
        else
          echo "⚠️ HTTP redirect not working"
        fi
