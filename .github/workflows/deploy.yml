name: Deploy MarinaObuv

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Run tests
        run: |
          cd web
          npm run test || echo "No tests configured"

      # Skip build in GitHub Action - build on server instead
      # - name: Build application
      #   run: |
      #       cd web
      #       npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/marinaobuv
            git pull origin main
            cd web
            npm ci --production
            npm run prisma:generate
            npm run prisma:migrate

            # Set environment variables for build
            export NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            export WHAPI_BASE_URL="${{ secrets.WHAPI_BASE_URL }}"
            export WHAPI_TOKEN="${{ secrets.WHAPI_TOKEN }}"
            export WHAPI_WEBHOOK_SECRET="${{ secrets.WHAPI_WEBHOOK_SECRET }}"
            export S3_ENDPOINT="${{ secrets.S3_ENDPOINT }}"
            export S3_REGION="${{ secrets.S3_REGION }}"
            export S3_BUCKET="${{ secrets.S3_BUCKET }}"
            export S3_ACCESS_KEY="${{ secrets.S3_ACCESS_KEY }}"
            export S3_SECRET_KEY="${{ secrets.S3_SECRET_KEY }}"
            export CDN_BASE_URL="${{ secrets.CDN_BASE_URL }}"
            export YC_FOLDER_ID="${{ secrets.YC_FOLDER_ID }}"
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export NODE_ENV=production

            npm run build

            # Setup parsing cron job
            if [ -f "src/scripts/deploy-cron.sh" ]; then
              ./src/scripts/deploy-cron.sh
            fi

            # Restart PM2
            pm2 restart marinaobuv

            echo "✅ Deployment complete!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Check if application is running
            pm2 status

            # Check cron job
            crontab -l | grep hourly-cron || echo "Cron job not found"

            # Check logs
            tail -n 5 /var/www/marinaobuv/web/logs/parsing-cron.log || echo "No parsing logs yet"
