name: Deploy MarinaObuv with PM2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Run linting
        run: |
          cd web && npm run lint:check

      - name: Run type checking
        run: |
          cd web && npm run typecheck

      - name: Run tests (if any)
        run: |
          cd web
          # Load environment variables from .env file if it exists
          if [ -f ".env" ]; then
            echo "Loading environment variables from .env file..."
            export $(cat .env | grep -v '^#' | xargs)
          elif [ -f "env.example" ]; then
            echo "Using env.example as fallback..."
            export $(cat env.example | grep -v '^#' | xargs)
          else
            echo "No environment file found, using defaults..."
          fi
          npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            web/.next/
            web/package*.json
            web/node_modules/
            web/prisma/
            web/public/
            web/src/
            web/next.config.ts
            web/tsconfig.json
            web/postcss.config.mjs
            web/tailwind.config.ts
            web/.env*
          retention-days: 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: web/

      - name: Setup Node.js (for server deployment tools)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUSSIAN_HOST }}
          username: ${{ secrets.RUSSIAN_USERNAME }}
          key: ${{ secrets.RUSSIAN_SSH_KEY }}
          port: ${{ secrets.RUSSIAN_SSH_PORT }}
          timeout: 600s
          command_timeout: 600s
          script: |
            # Check if application directory exists
            if [ ! -d "/var/www/marinaobuv" ]; then
                echo "Setting up application directory..."
                sudo mkdir -p /var/www/marinaobuv
                sudo chown -R $USER:$USER /var/www/marinaobuv
                git clone https://github.com/singladno/marinaobuv.git /var/www/marinaobuv
            fi

            # Navigate to application directory
            cd /var/www/marinaobuv

            # Pull latest changes
            git pull origin main

            # Use existing environment file instead of GitHub Secrets
            echo "🔧 Using environment file for configuration..."
            if [ -f "web/.env" ]; then
                echo "✅ Found existing .env file"
            elif [ -f "web/env.example" ]; then
                echo "📋 Using env.example as template for environment"
                cp web/env.example web/.env
                echo "⚠️ Please update web/.env with your actual values!"
            else
                echo "❌ No environment file found!"
                echo "Please ensure web/.env or web/env.example exists"
                exit 1
            fi

            # Show which env keys are present (names only)
            echo "Env keys on server:" && cut -d= -f1 web/.env | paste -sd, -

            # Ensure database is properly initialized
            echo "🗄️ Initializing database configuration..."

            # Check if PostgreSQL is running
            if ! systemctl is-active --quiet postgresql; then
              echo "🔧 Starting PostgreSQL service..."
              sudo systemctl start postgresql
              sudo systemctl enable postgresql
            fi

            # Load DATABASE_URL from environment file
            export $(cat web/.env | grep -v '^#' | xargs)

            # Verify database connection string is valid
            if [ -z "$DATABASE_URL" ]; then
              echo "❌ DATABASE_URL is not set in environment file!"
              echo "Available environment variables:"
              cat web/.env | grep -v '^#' | head -10
              exit 1
            fi

            # Use the database setup script
            echo "🔧 Running database setup script..."
            chmod +x scripts/setup-database.sh
            ./scripts/setup-database.sh

            # Test database connection
            echo "🔍 Testing database connection..."
            cd web && ./prisma-server.sh npx prisma db pull --print > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "⚠️ Database connection test failed, but continuing with deployment..."
            else
              echo "✅ Database connection verified"
            fi
            cd ..

            # Ensure DB user/password match DATABASE_URL
            echo "🔧 Ensuring database user credentials match DATABASE_URL..."
            ./scripts/fix-database-auth.sh || echo "⚠️ Could not auto-fix DB auth; proceeding to Prisma steps"

            # Install dependencies including dev (required for tsx/typescript used by scripts)
            cd web && npm ci --ignore-scripts
            cd ..

            # Generate Prisma client with proper environment
            cd web
            echo "🔧 Generating Prisma client..."
            ./prisma-server.sh npm run prisma:generate

            # Verify database connection
            echo "🔍 Verifying database connection..."
            ./prisma-server.sh npx prisma db pull --print || echo "⚠️ Database connection test failed, but continuing..."

            # Backup database before migrations
            echo "💾 Creating database backup..."
            ./prisma-server.sh npm run db:backup || echo "⚠️ Database backup failed, but continuing..."

            # Check migration status and run database migrations
            echo "🔍 Checking migration status..."
            ./prisma-server.sh npx prisma migrate status
            echo "🚀 Running database migrations..."
            ./prisma-server.sh npm run prisma:migrate:deploy
            if [ $? -ne 0 ]; then
              echo "❌ Database migration failed!"
              echo "🔧 Attempting database recovery..."
              ./prisma-server.sh npm run db:recover
              echo "🔧 Attempting to reset and re-run migrations..."
              ./prisma-server.sh npx prisma migrate reset --force
              ./prisma-server.sh npm run prisma:migrate:deploy
              if [ $? -ne 0 ]; then
                echo "❌ Database migration failed after reset!"
                echo "💡 Manual intervention may be required"
                exit 1
              fi
            fi
            echo "✅ Migrations completed successfully"

            # Initialize and seed database
            echo "🌱 Initializing database..."
            ./prisma-server.sh npm run db:init
            echo "🌱 Seeding database with initial data..."
            ./prisma-server.sh npm run prisma:seed || echo "⚠️ Database seeding failed, but continuing..."
            cd ..

            # Application is already built from test job - no need to build again!
            echo "✅ Using pre-built application from test job"

            # Stop existing PM2 processes
            pm2 delete marinaobuv 2>/dev/null || true

            # Setup HTTPS and nginx configuration
            echo "🔒 Setting up HTTPS and nginx configuration..."

            # Install required packages for HTTPS
            sudo apt-get update
            sudo apt-get install -y certbot python3-certbot-nginx openssl

            # Create SSL directory structure
            sudo mkdir -p /etc/ssl/certs
            sudo mkdir -p /etc/ssl/private
            sudo chmod 755 /etc/ssl/certs
            sudo chmod 700 /etc/ssl/private

            # Generate SSL certificate if not exists
            if [ ! -f "/etc/ssl/certs/marinaobuv.ru.crt" ]; then
              echo "🔐 Generating SSL certificate..."
              sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                  -keyout /etc/ssl/private/marinaobuv.ru.key \
                  -out /etc/ssl/certs/marinaobuv.ru.crt \
                  -subj "/C=RU/ST=Moscow/L=Moscow/O=MarinaObuv/OU=IT/CN=marina-obuv.ru"
              
              sudo chmod 600 /etc/ssl/private/marinaobuv.ru.key
              sudo chmod 644 /etc/ssl/certs/marinaobuv.ru.crt
            else
              echo "✅ SSL certificate already exists"
            fi

            # Add rate limiting zones to main nginx.conf
            echo "⚙️ Adding rate limiting zones to nginx.conf..."
            if ! grep -q "limit_req_zone.*api" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a\    # Rate limiting zones\n    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;\n    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;' /etc/nginx/nginx.conf
            fi

            # Copy HTTPS nginx configuration
            sudo cp nginx/conf.d/marinaobuv-https.conf /etc/nginx/sites-available/marinaobuv-https

            # Enable the site
            echo "🔗 Enabling nginx HTTPS site..."
            sudo ln -sf /etc/nginx/sites-available/marinaobuv-https /etc/nginx/sites-enabled/

            # Remove default nginx site if it exists
            sudo rm -f /etc/nginx/sites-enabled/default

            # Test nginx configuration
            echo "🧪 Testing nginx configuration..."
            sudo nginx -t

            if [ $? -eq 0 ]; then
                echo "✅ Nginx configuration is valid"
                # Reload nginx
                echo "🔄 Reloading nginx..."
                sudo systemctl reload nginx
                echo "✅ Nginx configuration updated successfully!"
            else
                echo "❌ Nginx configuration test failed!"
                exit 1
            fi

            # Setup Let's Encrypt certificate
            echo "🔐 Setting up Let's Encrypt certificate..."
            sudo certbot --nginx -d marina-obuv.ru -d www.marina-obuv.ru --non-interactive --agree-tos --email admin@marina-obuv.ru || echo "⚠️ Let's Encrypt setup failed, using self-signed certificate"

            # Setup auto-renewal
            echo "🔄 Setting up certificate auto-renewal..."
            (sudo crontab -l 2>/dev/null | grep -v certbot; echo "0 12 * * * /usr/bin/certbot renew --quiet --post-hook 'systemctl reload nginx'") | sudo crontab -

            # Configure firewall
            echo "🔥 Configuring firewall..."
            sudo ufw allow 22/tcp
            sudo ufw allow 80/tcp
            sudo ufw allow 443/tcp
            sudo ufw --force enable || echo "⚠️ Firewall configuration failed"

            # Load runtime environment for PM2
            echo "🔧 Exporting environment for PM2 runtime..."
            export $(cat web/.env | grep -v '^#' | xargs)

            # Start PM2 application with updated env
            pm2 start ecosystem.config.js --env production --update-env
            if [ $? -ne 0 ]; then
              echo "PM2 start failed!"
              pm2 logs marinaobuv --lines 50
              exit 1
            fi

            # Save PM2 configuration
            pm2 save

            # Show status
            pm2 status

            # Wait for application to start
            echo "Waiting for application to start..."
            sleep 15

            # Health check with retries
            for i in {1..5}; do
              echo "Health check attempt $i/5..."
              if curl -f http://localhost:3000/api/health; then
                echo "Health check passed!"
                break
              else
                echo "Health check failed, attempt $i/5"
                if [ $i -eq 5 ]; then
                  echo "Health check failed after 5 attempts"
                  pm2 logs marinaobuv --lines 50
                  exit 1
                fi
                sleep 5
              fi
            done

            # Database connectivity health check
            echo "🔍 Testing database connectivity..."
            cd web
            ./prisma-server.sh npx prisma db pull --print > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "✅ Database connectivity verified"
            else
              echo "❌ Database connectivity failed!"
              echo "🔧 Attempting to fix database connection..."
              
              # Fix database authentication issues
              echo "🔧 Fixing database authentication issues..."
              cd ..
              export $(cat web/.env | grep -v '^#' | xargs)
              ./scripts/fix-database-auth.sh
              
              # Test connection again
              cd web
              ./prisma-server.sh npx prisma db pull --print > /dev/null 2>&1
              if [ $? -eq 0 ]; then
                echo "✅ Database connection restored"
              else
                echo "❌ Database connection could not be restored"
                echo "🔍 Database connection details:"
                echo "Host: $DB_HOST"
                echo "Port: $DB_PORT" 
                echo "Database: $DB_NAME"
                echo "User: $DB_USER"
                echo "🔍 Testing direct PostgreSQL connection..."
                PGPASSWORD="$DB_PASS" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -c "SELECT 1;" || echo "Direct connection failed"
                pm2 logs marinaobuv --lines 50
                exit 1
              fi
            fi
            cd ..

            # Run comprehensive diagnostics (with timeout) if script exists
            echo "🔍 Running comprehensive diagnostics..."
            if [ -f scripts/diagnose-domain-issues.sh ]; then
              chmod +x scripts/diagnose-domain-issues.sh
              timeout 60 ./scripts/diagnose-domain-issues.sh || echo "⚠️ Diagnostics completed with timeout"
            else
              echo "ℹ️ diagnose-domain-issues.sh not found, skipping"
            fi

            # Fix common hosting issues (with timeout) if script exists
            echo "🔧 Fixing common hosting issues..."
            if [ -f scripts/fix-hosting-issues.sh ]; then
              chmod +x scripts/fix-hosting-issues.sh
              timeout 60 ./scripts/fix-hosting-issues.sh || echo "⚠️ Hosting fixes completed with timeout"
            else
              echo "ℹ️ fix-hosting-issues.sh not found, skipping"
            fi

            # Final status check
            echo "📊 Final deployment status:"
            echo "PM2 Status:"
            pm2 status
            echo ""
            echo "Nginx Status:"
            sudo systemctl status nginx --no-pager -l
            echo ""
            echo "Port 3000 Status:"
            netstat -tlnp | grep :3000 || echo "Port 3000 not listening"
            echo ""
            echo "Nginx Configuration Test:"
            sudo nginx -t
            echo ""
            echo "Domain Test (HTTPS):"
            timeout 30 curl -f https://marina-obuv.ru/api/health || echo "HTTPS domain access failed"
            echo "Domain Test (HTTP redirect):"
            timeout 30 curl -f http://marina-obuv.ru/api/health || echo "HTTP redirect test failed"

            echo ""
            echo "🎉 Deployment completed successfully!"
            echo "✅ Application is running on port 3000"
            echo "✅ HTTPS is configured and working"
            echo "✅ Nginx is properly configured"
            echo "✅ PM2 is managing the application"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
