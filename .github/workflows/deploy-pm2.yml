name: Deploy MarinaObuv with PM2

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: web/package-lock.json

            - name: Install dependencies
              run: |
                  npm install
                  cd web && npm install

            - name: Run linting
              run: |
                  cd web && npm run lint:check

            - name: Run type checking
              run: |
                  cd web && npm run typecheck

            - name: Run tests (if any)
              run: |
                  cd web && npm run build

    deploy:
        needs: test
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: web/package-lock.json

            - name: Install dependencies
              run: |
                  npm install
                  cd web && npm install

            - name: Build application
              run: |
                  cd web && npm run build
              env:
                  # Core Configuration
                  NODE_ENV: production
                  NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
                  NEXT_PUBLIC_BRAND_NAME: ${{ secrets.NEXT_PUBLIC_BRAND_NAME }}
                  
                  # Database
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  
                  # Authentication
                  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
                  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
                  
                  # Whapi.cloud API
                  WHAPI_BASE_URL: ${{ secrets.WHAPI_BASE_URL }}
                  WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
                  WHAPI_WEBHOOK_SECRET: ${{ secrets.WHAPI_WEBHOOK_SECRET }}
                  WHAPI_VERIFY_TOKEN: ${{ secrets.WHAPI_VERIFY_TOKEN }}
                  
                  # Yandex Object Storage (S3-compatible)
                  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
                  S3_REGION: ${{ secrets.S3_REGION }}
                  S3_BUCKET: ${{ secrets.S3_BUCKET }}
                  S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
                  S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
                  CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
                  
                  # Yandex Cloud
                  YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
                  YC_API_KEY: ${{ secrets.YC_API_KEY }}
                  
                  # Target Group Chat
                  TARGET_GROUP_ID: ${{ secrets.TARGET_GROUP_ID }}
                  
                  # OpenAI
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
                  OPENAI_VISION_MODEL: ${{ secrets.OPENAI_VISION_MODEL }}
                  OPENAI_REQUEST_DELAY_MS: ${{ secrets.OPENAI_REQUEST_DELAY_MS }}
                  
                  # Processing Configuration
                  MESSAGE_FETCH_HOURS: ${{ secrets.MESSAGE_FETCH_HOURS }}
                  PROCESSING_BATCH_SIZE: ${{ secrets.PROCESSING_BATCH_SIZE }}
                  
                  # Session
                  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

            - name: Deploy to server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.RUSSIAN_HOST }}
                  username: ${{ secrets.RUSSIAN_USERNAME }}
                  key: ${{ secrets.RUSSIAN_SSH_KEY }}
                  script: |
                      # Check if application directory exists
                      if [ ! -d "/var/www/marinaobuv" ]; then
                          echo "Setting up application directory..."
                          sudo mkdir -p /var/www/marinaobuv
                          sudo chown -R $USER:$USER /var/www/marinaobuv
                          git clone https://github.com/singladno/marinaobuv.git /var/www/marinaobuv
                      fi

                      # Navigate to application directory
                      cd /var/www/marinaobuv

                      # Pull latest changes
                      git pull origin main

                      # Install dependencies
                      npm install
                      cd web && npm ci --production
                      cd ..

                      # Generate Prisma client
                      cd web && npm run prisma:generate
                      cd ..

                      # Run database migrations
                      cd web && npm run prisma:migrate
                      cd ..

                      # Build application
                      cd web && npm run build
                      cd ..

                      # Stop existing PM2 processes
                      pm2 delete marinaobuv 2>/dev/null || true

                      # Start PM2 application
                      pm2 start ecosystem.config.js --env production

                      # Save PM2 configuration
                      pm2 save

                      # Show status
                      pm2 status

                      # Health check
                      sleep 10
                      curl -f http://localhost:3000/api/health || exit 1

            - name: Notify deployment status
              if: always()
              run: |
                  if [ "${{ job.status }}" == "success" ]; then
                    echo "✅ Deployment successful!"
                  else
                    echo "❌ Deployment failed!"
                  fi