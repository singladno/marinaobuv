name: Deploy MarinaObuv with PM2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Run linting
        run: |
          cd web && npm run lint:check

      - name: Run type checking
        run: |
          cd web && npm run typecheck

      - name: Run tests (if any)
        run: |
          cd web && npm run build
        env:
          # Core Configuration
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_BRAND_NAME: ${{ secrets.NEXT_PUBLIC_BRAND_NAME }}

          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # Authentication
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

          # Whapi.cloud API
          WHAPI_BASE_URL: ${{ secrets.WHAPI_BASE_URL }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHAPI_WEBHOOK_SECRET: ${{ secrets.WHAPI_WEBHOOK_SECRET }}
          WHAPI_VERIFY_TOKEN: ${{ secrets.WHAPI_VERIFY_TOKEN }}

          # Yandex Object Storage (S3-compatible)
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}

          # Yandex Cloud
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
          YC_API_KEY: ${{ secrets.YC_API_KEY }}

          # Target Group Chat
          TARGET_GROUP_ID: ${{ secrets.TARGET_GROUP_ID }}

          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_VISION_MODEL: ${{ secrets.OPENAI_VISION_MODEL }}
          OPENAI_REQUEST_DELAY_MS: ${{ secrets.OPENAI_REQUEST_DELAY_MS }}

          # Processing Configuration
          MESSAGE_FETCH_HOURS: ${{ secrets.MESSAGE_FETCH_HOURS }}
          PROCESSING_BATCH_SIZE: ${{ secrets.PROCESSING_BATCH_SIZE }}

          # Session
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Build application
        run: |
          cd web && npm run build
        env:
          # Core Configuration
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_BRAND_NAME: ${{ secrets.NEXT_PUBLIC_BRAND_NAME }}

          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # Authentication
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

          # Whapi.cloud API
          WHAPI_BASE_URL: ${{ secrets.WHAPI_BASE_URL }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHAPI_WEBHOOK_SECRET: ${{ secrets.WHAPI_WEBHOOK_SECRET }}
          WHAPI_VERIFY_TOKEN: ${{ secrets.WHAPI_VERIFY_TOKEN }}

          # Yandex Object Storage (S3-compatible)
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}

          # Yandex Cloud
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
          YC_API_KEY: ${{ secrets.YC_API_KEY }}

          # Target Group Chat
          TARGET_GROUP_ID: ${{ secrets.TARGET_GROUP_ID }}

          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_VISION_MODEL: ${{ secrets.OPENAI_VISION_MODEL }}
          OPENAI_REQUEST_DELAY_MS: ${{ secrets.OPENAI_REQUEST_DELAY_MS }}

          # Processing Configuration
          MESSAGE_FETCH_HOURS: ${{ secrets.MESSAGE_FETCH_HOURS }}
          PROCESSING_BATCH_SIZE: ${{ secrets.PROCESSING_BATCH_SIZE }}

          # Session
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUSSIAN_HOST }}
          username: ${{ secrets.RUSSIAN_USERNAME }}
          key: ${{ secrets.RUSSIAN_SSH_KEY }}
          port: ${{ secrets.RUSSIAN_SSH_PORT }}
          timeout: 600s
          command_timeout: 600s
          script: |
            # Check if application directory exists
            if [ ! -d "/var/www/marinaobuv" ]; then
                echo "Setting up application directory..."
                sudo mkdir -p /var/www/marinaobuv
                sudo chown -R $USER:$USER /var/www/marinaobuv
                git clone https://github.com/singladno/marinaobuv.git /var/www/marinaobuv
            fi

            # Navigate to application directory
            cd /var/www/marinaobuv

            # Pull latest changes
            git pull origin main

            # Ensure env directory exists and write production env from secrets
            mkdir -p web
            : > web/.env.production
            echo "NODE_ENV=production" >> web/.env.production
            # Public
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> web/.env.production
            echo "NEXT_PUBLIC_BRAND_NAME=${{ secrets.NEXT_PUBLIC_BRAND_NAME }}" >> web/.env.production
            # Database
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> web/.env.production
            # Auth
            echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> web/.env.production
            echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> web/.env.production
            # Whapi
            echo "WHAPI_BASE_URL=${{ secrets.WHAPI_BASE_URL }}" >> web/.env.production
            echo "WHAPI_TOKEN=${{ secrets.WHAPI_TOKEN }}" >> web/.env.production
            echo "WHAPI_WEBHOOK_SECRET=${{ secrets.WHAPI_WEBHOOK_SECRET }}" >> web/.env.production
            echo "WHAPI_VERIFY_TOKEN=${{ secrets.WHAPI_VERIFY_TOKEN }}" >> web/.env.production
            # S3
            echo "S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}" >> web/.env.production
            echo "S3_REGION=${{ secrets.S3_REGION }}" >> web/.env.production
            echo "S3_BUCKET=${{ secrets.S3_BUCKET }}" >> web/.env.production
            echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}" >> web/.env.production
            echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}" >> web/.env.production
            echo "CDN_BASE_URL=${{ secrets.CDN_BASE_URL }}" >> web/.env.production
            # Yandex Cloud
            echo "YC_FOLDER_ID=${{ secrets.YC_FOLDER_ID }}" >> web/.env.production
            echo "YC_API_KEY=${{ secrets.YC_API_KEY }}" >> web/.env.production
            # Target Group
            echo "TARGET_GROUP_ID=${{ secrets.TARGET_GROUP_ID }}" >> web/.env.production
            # OpenAI
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> web/.env.production
            echo "OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}" >> web/.env.production
            echo "OPENAI_VISION_MODEL=${{ secrets.OPENAI_VISION_MODEL }}" >> web/.env.production
            echo "OPENAI_REQUEST_DELAY_MS=${{ secrets.OPENAI_REQUEST_DELAY_MS }}" >> web/.env.production
            # Processing
            echo "MESSAGE_FETCH_HOURS=${{ secrets.MESSAGE_FETCH_HOURS }}" >> web/.env.production
            echo "PROCESSING_BATCH_SIZE=${{ secrets.PROCESSING_BATCH_SIZE }}" >> web/.env.production
            # Session
            echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> web/.env.production

            # Show which env keys are present (names only)
            echo "Env keys on server:" && cut -d= -f1 web/.env.production | paste -sd, -

            # Install dependencies (include devDependencies for build)
            cd web && npm ci --ignore-scripts
            cd ..

            # Generate Prisma client
            cd web && npm run prisma:generate
            cd ..

            # Run database migrations (use proper env loading)
            cd web && npm run prisma:migrate
            cd ..

            # Build application (Next.js will automatically load .env.production)
            cd web && npm run build
            if [ $? -ne 0 ]; then
              echo "Build failed!"
              exit 1
            fi
            cd ..

            # Stop existing PM2 processes
            pm2 delete marinaobuv 2>/dev/null || true

            # Fix nginx configuration for PM2
            echo "🔧 Configuring nginx for PM2 deployment..."
            
            # Create nginx configuration for PM2
            sudo tee /etc/nginx/sites-available/marinaobuv > /dev/null <<EOF
server {
    listen 80;
    server_name marina-obuv.ru www.marina-obuv.ru;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Main application - proxy to PM2 running on localhost:3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        proxy_cache_bypass \$http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # API routes
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
    
    # Static files
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Health check
    location /health {
        proxy_pass http://localhost:3000/api/health;
        access_log off;
    }
}
EOF

            # Enable the site
            echo "🔗 Enabling nginx site..."
            sudo ln -sf /etc/nginx/sites-available/marinaobuv /etc/nginx/sites-enabled/
            
            # Remove default nginx site if it exists
            sudo rm -f /etc/nginx/sites-enabled/default
            
            # Test nginx configuration
            echo "🧪 Testing nginx configuration..."
            sudo nginx -t
            
            if [ $? -eq 0 ]; then
                echo "✅ Nginx configuration is valid"
                # Reload nginx
                echo "🔄 Reloading nginx..."
                sudo systemctl reload nginx
                echo "✅ Nginx configuration updated successfully!"
            else
                echo "❌ Nginx configuration test failed!"
                exit 1
            fi

            # Start PM2 application
            pm2 start ecosystem.config.js --env production
            if [ $? -ne 0 ]; then
              echo "PM2 start failed!"
              pm2 logs marinaobuv --lines 50
              exit 1
            fi

            # Save PM2 configuration
            pm2 save

            # Show status
            pm2 status

            # Wait for application to start
            echo "Waiting for application to start..."
            sleep 15

            # Health check with retries
            for i in {1..5}; do
              echo "Health check attempt $i/5..."
              if curl -f http://localhost:3000/api/health; then
                echo "Health check passed!"
                break
              else
                echo "Health check failed, attempt $i/5"
                if [ $i -eq 5 ]; then
                  echo "Health check failed after 5 attempts"
                  pm2 logs marinaobuv --lines 50
                  exit 1
                fi
                sleep 5
              fi
            done

            # Final status check
            echo "📊 Final deployment status:"
            echo "PM2 Status:"
            pm2 status
            echo ""
            echo "Nginx Status:"
            sudo systemctl status nginx --no-pager -l
            echo ""
            echo "Port 3000 Status:"
            netstat -tlnp | grep :3000 || echo "Port 3000 not listening"
            echo ""
            echo "Nginx Configuration Test:"
            sudo nginx -t
            echo ""
            echo "Domain Test:"
            curl -f http://marina-obuv.ru/api/health || echo "Domain access failed"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
