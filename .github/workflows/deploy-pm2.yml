name: Deploy MarinaObuv with PM2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Run linting
        run: |
          cd web && npm run lint:check

      - name: Run type checking
        run: |
          cd web && npm run typecheck

      - name: Run tests (if any)
        run: |
          cd web && npm run build
        env:
          # Core Configuration
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_BRAND_NAME: ${{ secrets.NEXT_PUBLIC_BRAND_NAME }}

          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # Authentication
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

          # Whapi.cloud API
          WHAPI_BASE_URL: ${{ secrets.WHAPI_BASE_URL }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHAPI_WEBHOOK_SECRET: ${{ secrets.WHAPI_WEBHOOK_SECRET }}
          WHAPI_VERIFY_TOKEN: ${{ secrets.WHAPI_VERIFY_TOKEN }}

          # Yandex Object Storage (S3-compatible)
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}

          # Yandex Cloud
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
          YC_API_KEY: ${{ secrets.YC_API_KEY }}

          # Target Group Chat
          TARGET_GROUP_ID: ${{ secrets.TARGET_GROUP_ID }}

          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_VISION_MODEL: ${{ secrets.OPENAI_VISION_MODEL }}
          OPENAI_REQUEST_DELAY_MS: ${{ secrets.OPENAI_REQUEST_DELAY_MS }}

          # Processing Configuration
          MESSAGE_FETCH_HOURS: ${{ secrets.MESSAGE_FETCH_HOURS }}
          PROCESSING_BATCH_SIZE: ${{ secrets.PROCESSING_BATCH_SIZE }}

          # Session
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          npm install
          cd web && npm install

      - name: Build application
        run: |
          cd web && npm run build
        env:
          # Core Configuration
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_BRAND_NAME: ${{ secrets.NEXT_PUBLIC_BRAND_NAME }}

          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # Authentication
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

          # Whapi.cloud API
          WHAPI_BASE_URL: ${{ secrets.WHAPI_BASE_URL }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHAPI_WEBHOOK_SECRET: ${{ secrets.WHAPI_WEBHOOK_SECRET }}
          WHAPI_VERIFY_TOKEN: ${{ secrets.WHAPI_VERIFY_TOKEN }}

          # Yandex Object Storage (S3-compatible)
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}

          # Yandex Cloud
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
          YC_API_KEY: ${{ secrets.YC_API_KEY }}

          # Target Group Chat
          TARGET_GROUP_ID: ${{ secrets.TARGET_GROUP_ID }}

          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_VISION_MODEL: ${{ secrets.OPENAI_VISION_MODEL }}
          OPENAI_REQUEST_DELAY_MS: ${{ secrets.OPENAI_REQUEST_DELAY_MS }}

          # Processing Configuration
          MESSAGE_FETCH_HOURS: ${{ secrets.MESSAGE_FETCH_HOURS }}
          PROCESSING_BATCH_SIZE: ${{ secrets.PROCESSING_BATCH_SIZE }}

          # Session
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUSSIAN_HOST }}
          username: ${{ secrets.RUSSIAN_USERNAME }}
          key: ${{ secrets.RUSSIAN_SSH_KEY }}
          port: ${{ secrets.RUSSIAN_SSH_PORT }}
          timeout: 600s
          command_timeout: 600s
          script: |
            # Check if application directory exists
            if [ ! -d "/var/www/marinaobuv" ]; then
                echo "Setting up application directory..."
                sudo mkdir -p /var/www/marinaobuv
                sudo chown -R $USER:$USER /var/www/marinaobuv
                git clone https://github.com/singladno/marinaobuv.git /var/www/marinaobuv
            fi

            # Navigate to application directory
            cd /var/www/marinaobuv

            # Pull latest changes
            git pull origin main

            # Ensure env directory exists and write production env from secrets
            mkdir -p web
            : > web/.env.production
            echo "NODE_ENV=production" >> web/.env.production
            # Public
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> web/.env.production
            echo "NEXT_PUBLIC_BRAND_NAME=${{ secrets.NEXT_PUBLIC_BRAND_NAME }}" >> web/.env.production
            # Database
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> web/.env.production
            # Auth
            echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> web/.env.production
            echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> web/.env.production
            # Whapi
            echo "WHAPI_BASE_URL=${{ secrets.WHAPI_BASE_URL }}" >> web/.env.production
            echo "WHAPI_TOKEN=${{ secrets.WHAPI_TOKEN }}" >> web/.env.production
            echo "WHAPI_WEBHOOK_SECRET=${{ secrets.WHAPI_WEBHOOK_SECRET }}" >> web/.env.production
            echo "WHAPI_VERIFY_TOKEN=${{ secrets.WHAPI_VERIFY_TOKEN }}" >> web/.env.production
            # S3
            echo "S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}" >> web/.env.production
            echo "S3_REGION=${{ secrets.S3_REGION }}" >> web/.env.production
            echo "S3_BUCKET=${{ secrets.S3_BUCKET }}" >> web/.env.production
            echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}" >> web/.env.production
            echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}" >> web/.env.production
            echo "CDN_BASE_URL=${{ secrets.CDN_BASE_URL }}" >> web/.env.production
            # Yandex Cloud
            echo "YC_FOLDER_ID=${{ secrets.YC_FOLDER_ID }}" >> web/.env.production
            echo "YC_API_KEY=${{ secrets.YC_API_KEY }}" >> web/.env.production
            # Target Group
            echo "TARGET_GROUP_ID=${{ secrets.TARGET_GROUP_ID }}" >> web/.env.production
            # OpenAI
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> web/.env.production
            echo "OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}" >> web/.env.production
            echo "OPENAI_VISION_MODEL=${{ secrets.OPENAI_VISION_MODEL }}" >> web/.env.production
            echo "OPENAI_REQUEST_DELAY_MS=${{ secrets.OPENAI_REQUEST_DELAY_MS }}" >> web/.env.production
            # Processing
            echo "MESSAGE_FETCH_HOURS=${{ secrets.MESSAGE_FETCH_HOURS }}" >> web/.env.production
            echo "PROCESSING_BATCH_SIZE=${{ secrets.PROCESSING_BATCH_SIZE }}" >> web/.env.production
            # Session
            echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> web/.env.production

            # Show which env keys are present (names only)
            echo "Env keys on server:" && cut -d= -f1 web/.env.production | paste -sd, -

            # Ensure database is properly initialized
            echo "🗄️ Initializing database configuration..."

            # Check if PostgreSQL is running
            if ! systemctl is-active --quiet postgresql; then
              echo "🔧 Starting PostgreSQL service..."
              sudo systemctl start postgresql
              sudo systemctl enable postgresql
            fi

            # Verify database connection string is valid
            if [ -z "${{ secrets.DATABASE_URL }}" ]; then
              echo "❌ DATABASE_URL is not set in secrets!"
              exit 1
            fi

            # Use the database setup script
            echo "🔧 Running database setup script..."
            chmod +x scripts/setup-database.sh
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            ./scripts/setup-database.sh

            # Test database connection
            echo "🔍 Testing database connection..."
            cd web && ./prisma-server.sh npx prisma db pull --print > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "⚠️ Database connection test failed, but continuing with deployment..."
            else
              echo "✅ Database connection verified"
            fi
            cd ..

            # Install dependencies (include devDependencies for build)
            cd web && npm ci --ignore-scripts
            cd ..

            # Generate Prisma client with proper environment
            cd web && echo "🔧 Generating Prisma client..."
            cd web && ./prisma-server.sh npm run prisma:generate
            cd ..

            # Verify database connection
            cd web && echo "🔍 Verifying database connection..."
            cd web && ./prisma-server.sh npx prisma db pull --print || echo "⚠️ Database connection test failed, but continuing..."
            cd ..

            # Backup database before migrations
            cd web && echo "💾 Creating database backup..."
            cd web && ./prisma-server.sh npm run db:backup || echo "⚠️ Database backup failed, but continuing..."
            cd ..

            # Check migration status and run database migrations
            cd web && echo "🔍 Checking migration status..."
            cd web && ./prisma-server.sh npx prisma migrate status
            cd web && echo "🚀 Running database migrations..."
            cd web && ./prisma-server.sh npm run prisma:migrate:deploy
            if [ $? -ne 0 ]; then
              echo "❌ Database migration failed!"
              echo "🔧 Attempting database recovery..."
              cd web && ./prisma-server.sh npm run db:recover
              echo "🔧 Attempting to reset and re-run migrations..."
              cd web && ./prisma-server.sh npx prisma migrate reset --force
              cd web && ./prisma-server.sh npm run prisma:migrate:deploy
              if [ $? -ne 0 ]; then
                echo "❌ Database migration failed after reset!"
                echo "💡 Manual intervention may be required"
                exit 1
              fi
            fi
            cd web && echo "✅ Migrations completed successfully"
            cd ..

            # Initialize and seed database
            cd web && echo "🌱 Initializing database..."
            cd web && ./prisma-server.sh npm run db:init
            cd web && echo "🌱 Seeding database with initial data..."
            cd web && ./prisma-server.sh npm run prisma:seed || echo "⚠️ Database seeding failed, but continuing..."
            cd ..

            # Build application (Next.js will automatically load .env.production)
            cd web && npm run build
            if [ $? -ne 0 ]; then
              echo "Build failed!"
              exit 1
            fi
            cd ..

            # Stop existing PM2 processes
            pm2 delete marinaobuv 2>/dev/null || true

            # Setup HTTPS and nginx configuration
            echo "🔒 Setting up HTTPS and nginx configuration..."

            # Install required packages for HTTPS
            sudo apt-get update
            sudo apt-get install -y certbot python3-certbot-nginx openssl

            # Create SSL directory structure
            sudo mkdir -p /etc/ssl/certs
            sudo mkdir -p /etc/ssl/private
            sudo chmod 755 /etc/ssl/certs
            sudo chmod 700 /etc/ssl/private

            # Generate SSL certificate if not exists
            if [ ! -f "/etc/ssl/certs/marinaobuv.ru.crt" ]; then
              echo "🔐 Generating SSL certificate..."
              sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                  -keyout /etc/ssl/private/marinaobuv.ru.key \
                  -out /etc/ssl/certs/marinaobuv.ru.crt \
                  -subj "/C=RU/ST=Moscow/L=Moscow/O=MarinaObuv/OU=IT/CN=marina-obuv.ru"
              
              sudo chmod 600 /etc/ssl/private/marinaobuv.ru.key
              sudo chmod 644 /etc/ssl/certs/marinaobuv.ru.crt
            else
              echo "✅ SSL certificate already exists"
            fi

            # Add rate limiting zones to main nginx.conf
            echo "⚙️ Adding rate limiting zones to nginx.conf..."
            if ! grep -q "limit_req_zone.*api" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a\    # Rate limiting zones\n    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;\n    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;' /etc/nginx/nginx.conf
            fi

            # Copy HTTPS nginx configuration
            sudo cp nginx/conf.d/marinaobuv-https.conf /etc/nginx/sites-available/marinaobuv-https

            # Enable the site
            echo "🔗 Enabling nginx HTTPS site..."
            sudo ln -sf /etc/nginx/sites-available/marinaobuv-https /etc/nginx/sites-enabled/

            # Remove default nginx site if it exists
            sudo rm -f /etc/nginx/sites-enabled/default

            # Test nginx configuration
            echo "🧪 Testing nginx configuration..."
            sudo nginx -t

            if [ $? -eq 0 ]; then
                echo "✅ Nginx configuration is valid"
                # Reload nginx
                echo "🔄 Reloading nginx..."
                sudo systemctl reload nginx
                echo "✅ Nginx configuration updated successfully!"
            else
                echo "❌ Nginx configuration test failed!"
                exit 1
            fi

            # Setup Let's Encrypt certificate
            echo "🔐 Setting up Let's Encrypt certificate..."
            sudo certbot --nginx -d marina-obuv.ru -d www.marina-obuv.ru --non-interactive --agree-tos --email admin@marina-obuv.ru || echo "⚠️ Let's Encrypt setup failed, using self-signed certificate"

            # Setup auto-renewal
            echo "🔄 Setting up certificate auto-renewal..."
            (sudo crontab -l 2>/dev/null | grep -v certbot; echo "0 12 * * * /usr/bin/certbot renew --quiet --post-hook 'systemctl reload nginx'") | sudo crontab -

            # Configure firewall
            echo "🔥 Configuring firewall..."
            sudo ufw allow 22/tcp
            sudo ufw allow 80/tcp
            sudo ufw allow 443/tcp
            sudo ufw --force enable || echo "⚠️ Firewall configuration failed"

            # Start PM2 application
            pm2 start ecosystem.config.js --env production
            if [ $? -ne 0 ]; then
              echo "PM2 start failed!"
              pm2 logs marinaobuv --lines 50
              exit 1
            fi

            # Save PM2 configuration
            pm2 save

            # Show status
            pm2 status

            # Wait for application to start
            echo "Waiting for application to start..."
            sleep 15

            # Health check with retries
            for i in {1..5}; do
              echo "Health check attempt $i/5..."
              if curl -f http://localhost:3000/api/health; then
                echo "Health check passed!"
                break
              else
                echo "Health check failed, attempt $i/5"
                if [ $i -eq 5 ]; then
                  echo "Health check failed after 5 attempts"
                  pm2 logs marinaobuv --lines 50
                  exit 1
                fi
                sleep 5
              fi
            done

            # Database connectivity health check
            echo "🔍 Testing database connectivity..."
            cd web && ./prisma-server.sh npx prisma db pull --print > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "✅ Database connectivity verified"
            else
              echo "❌ Database connectivity failed!"
              echo "🔧 Attempting to fix database connection..."
              
              # Fix database authentication issues
              echo "🔧 Fixing database authentication issues..."
              export DATABASE_URL="${{ secrets.DATABASE_URL }}"
              ./scripts/fix-database-auth.sh
              
              # Test connection again
              cd web && ./prisma-server.sh npx prisma db pull --print > /dev/null 2>&1
              if [ $? -eq 0 ]; then
                echo "✅ Database connection restored"
              else
                echo "❌ Database connection could not be restored"
                echo "🔍 Database connection details:"
                echo "Host: $DB_HOST"
                echo "Port: $DB_PORT" 
                echo "Database: $DB_NAME"
                echo "User: $DB_USER"
                echo "🔍 Testing direct PostgreSQL connection..."
                PGPASSWORD="$DB_PASS" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -c "SELECT 1;" || echo "Direct connection failed"
                pm2 logs marinaobuv --lines 50
                exit 1
              fi
            fi
            cd ..

            # Run comprehensive diagnostics (with timeout)
            echo "🔍 Running comprehensive diagnostics..."
            chmod +x scripts/diagnose-domain-issues.sh
            timeout 60 ./scripts/diagnose-domain-issues.sh || echo "⚠️ Diagnostics completed with timeout"

            # Fix common hosting issues (with timeout)
            echo "🔧 Fixing common hosting issues..."
            chmod +x scripts/fix-hosting-issues.sh
            timeout 60 ./scripts/fix-hosting-issues.sh || echo "⚠️ Hosting fixes completed with timeout"

            # Final status check
            echo "📊 Final deployment status:"
            echo "PM2 Status:"
            pm2 status
            echo ""
            echo "Nginx Status:"
            sudo systemctl status nginx --no-pager -l
            echo ""
            echo "Port 3000 Status:"
            netstat -tlnp | grep :3000 || echo "Port 3000 not listening"
            echo ""
            echo "Nginx Configuration Test:"
            sudo nginx -t
            echo ""
            echo "Domain Test (HTTPS):"
            timeout 30 curl -f https://marina-obuv.ru/api/health || echo "HTTPS domain access failed"
            echo "Domain Test (HTTP redirect):"
            timeout 30 curl -f http://marina-obuv.ru/api/health || echo "HTTP redirect test failed"

            echo ""
            echo "🎉 Deployment completed successfully!"
            echo "✅ Application is running on port 3000"
            echo "✅ HTTPS is configured and working"
            echo "✅ Nginx is properly configured"
            echo "✅ PM2 is managing the application"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
