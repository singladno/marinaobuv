name: Deploy MarinaObuv with PM2

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: web/package-lock.json

            - name: Install dependencies
              run: |
                  npm install
                  cd web && npm install

            - name: Run linting
              run: |
                  cd web && npm run lint:check

            - name: Run type checking
              run: |
                  cd web && npm run typecheck

            - name: Run tests (if any)
              run: |
                  cd web && npm run build

    deploy:
        needs: test
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: web/package-lock.json

            - name: Install dependencies
              run: |
                  npm install
                  cd web && npm install

            - name: Build application
              run: |
                  cd web && npm run build

            - name: Deploy to server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.RUSSIAN_HOST }}
                  username: ${{ secrets.RUSSIAN_USERNAME }}
                  key: ${{ secrets.RUSSIAN_SSH_KEY }}
                  script: |
                      # Navigate to application directory
                      cd /var/www/marinaobuv

                      # Pull latest changes
                      git pull origin main

                      # Install dependencies
                      npm install
                      cd web && npm ci --production

                      # Generate Prisma client
                      npm run prisma:generate

                      # Run database migrations
                      npm run prisma:migrate

                      # Build application
                      npm run build

                      # Restart PM2 application
                      pm2 restart marinaobuv

                      # Show status
                      pm2 status

                      # Health check
                      sleep 10
                      curl -f http://localhost:3000/api/health || exit 1

            - name: Notify deployment status
              if: always()
              run: |
                  if [ "${{ job.status }}" == "success" ]; then
                    echo "✅ Deployment successful!"
                  else
                    echo "❌ Deployment failed!"
                  fi
