name: Deploy Full Stack with HTTPS

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            deploy_type:
                description: "Deployment type"
                required: true
                default: "full"
                type: choice
                options:
                    - full
                    - https-only
                    - app-only

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup SSH
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

            - name: Add server to known hosts
              run: |
                  ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Deploy application
              if: github.event.inputs.deploy_type != 'https-only'
              run: |
                  echo "🚀 Deploying application..."

                  # Create deployment script
                  cat > deploy-app-remote.sh << 'EOF'
                  #!/bin/bash
                  set -e

                  echo "🚀 Starting application deployment..."

                  PROJECT_DIR="/var/www/marinaobuv"

                  # 1. Navigate to project directory
                  cd $PROJECT_DIR

                  # 2. Pull latest changes
                  echo "📥 Pulling latest changes..."
                  git pull origin main

                  # 3. Install dependencies
                  echo "📦 Installing dependencies..."
                  cd web
                  npm ci --production

                  # 4. Build application
                  echo "🔨 Building application..."
                  npm run build

                  # 5. Restart PM2
                  echo "🔄 Restarting PM2..."
                  pm2 restart marinaobuv || pm2 start ecosystem.config.js --env production
                  pm2 save

                  echo "✅ Application deployment completed!"
                  EOF

                  chmod +x deploy-app-remote.sh
                  scp deploy-app-remote.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/
                  ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "bash /tmp/deploy-app-remote.sh"

            - name: Deploy HTTPS configuration
              if: github.event.inputs.deploy_type != 'app-only'
              run: |
                  echo "🔒 Deploying HTTPS configuration..."

                  # Create HTTPS deployment script
                  cat > deploy-https-remote.sh << 'EOF'
                  #!/bin/bash
                  set -e

                  echo "🔒 Starting HTTPS deployment..."

                  PROJECT_DIR="/var/www/marinaobuv"
                  NGINX_DIR="/etc/nginx"
                  SSL_DIR="/etc/ssl"
                  DOMAIN="marina-obuv.ru"

                  # 1. Backup current configuration
                  echo "📦 Backing up current configuration..."
                  sudo cp -r $NGINX_DIR/sites-available $NGINX_DIR/sites-available.backup.$(date +%Y%m%d_%H%M%S) || true
                  sudo cp -r $NGINX_DIR/sites-enabled $NGINX_DIR/sites-enabled.backup.$(date +%Y%m%d_%H%M%S) || true

                  # 2. Install required packages
                  echo "📦 Installing required packages..."
                  sudo apt-get update
                  sudo apt-get install -y nginx certbot python3-certbot-nginx openssl

                  # 3. Create SSL directory structure
                  echo "📁 Creating SSL directory structure..."
                  sudo mkdir -p $SSL_DIR/certs
                  sudo mkdir -p $SSL_DIR/private
                  sudo chmod 755 $SSL_DIR/certs
                  sudo chmod 700 $SSL_DIR/private

                  # 4. Generate SSL certificate if not exists
                  if [ ! -f "$SSL_DIR/certs/marinaobuv.ru.crt" ]; then
                    echo "🔐 Generating SSL certificate..."
                    sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                        -keyout $SSL_DIR/private/marinaobuv.ru.key \
                        -out $SSL_DIR/certs/marinaobuv.ru.crt \
                        -subj "/C=RU/ST=Moscow/L=Moscow/O=MarinaObuv/OU=IT/CN=$DOMAIN"
                    
                    sudo chmod 600 $SSL_DIR/private/marinaobuv.ru.key
                    sudo chmod 644 $SSL_DIR/certs/marinaobuv.ru.crt
                  else
                    echo "✅ SSL certificate already exists"
                  fi

                  # 5. Deploy nginx configuration
                  echo "⚙️ Deploying nginx HTTPS configuration..."
                  sudo cp $PROJECT_DIR/nginx/conf.d/marinaobuv-https.conf $NGINX_DIR/sites-available/marinaobuv-https

                  # Enable the site
                  sudo ln -sf $NGINX_DIR/sites-available/marinaobuv-https $NGINX_DIR/sites-enabled/
                  sudo rm -f $NGINX_DIR/sites-enabled/default

                  # 6. Test nginx configuration
                  echo "🧪 Testing nginx configuration..."
                  if sudo nginx -t; then
                    echo "✅ Nginx configuration is valid"
                  else
                    echo "❌ Nginx configuration test failed"
                    exit 1
                  fi

                  # 7. Reload nginx
                  echo "🔄 Reloading nginx..."
                  sudo systemctl reload nginx

                  # 8. Setup Let's Encrypt certificate
                  echo "🔐 Setting up Let's Encrypt certificate..."
                  sudo certbot --nginx -d $DOMAIN -d www.$DOMAIN --non-interactive --agree-tos --email admin@$DOMAIN || echo "⚠️ Let's Encrypt setup failed, using self-signed certificate"

                  # 9. Setup auto-renewal
                  echo "🔄 Setting up certificate auto-renewal..."
                  (sudo crontab -l 2>/dev/null | grep -v certbot; echo "0 12 * * * /usr/bin/certbot renew --quiet --post-hook 'systemctl reload nginx'") | sudo crontab -

                  # 10. Configure firewall
                  echo "🔥 Configuring firewall..."
                  sudo ufw allow 22/tcp
                  sudo ufw allow 80/tcp
                  sudo ufw allow 443/tcp
                  sudo ufw --force enable || echo "⚠️ Firewall configuration failed"

                  echo "✅ HTTPS deployment completed!"
                  EOF

                  chmod +x deploy-https-remote.sh
                  scp deploy-https-remote.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/
                  ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "sudo bash /tmp/deploy-https-remote.sh"

            - name: Verify deployment
              run: |
                  echo "🔍 Verifying deployment..."
                  sleep 10

                  # Test HTTP redirect
                  echo "Testing HTTP to HTTPS redirect..."
                  if curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }} | grep -q "301\|302"; then
                    echo "✅ HTTP redirect working"
                  else
                    echo "⚠️ HTTP redirect not working"
                  fi

                  # Test HTTPS endpoint
                  echo "Testing HTTPS endpoint..."
                  if curl -k -s -o /dev/null -w "%{http_code}" https://${{ secrets.SERVER_HOST }}/health | grep -q "200"; then
                    echo "✅ HTTPS deployment successful!"
                  else
                    echo "⚠️ HTTPS test failed, but deployment completed"
                  fi

            - name: Run diagnostics
              run: |
                  echo "🔍 Running post-deployment diagnostics..."

                  # Create diagnostic script
                  cat > run-diagnostics.sh << 'EOF'
                  #!/bin/bash

                  echo "🔍 Running HTTPS diagnostics..."

                  # Check nginx status
                  if systemctl is-active --quiet nginx; then
                    echo "✅ Nginx is running"
                  else
                    echo "❌ Nginx is not running"
                  fi

                  # Check PM2 status
                  if command -v pm2 &> /dev/null; then
                    if pm2 list | grep -q "marinaobuv"; then
                      echo "✅ PM2 app is running"
                    else
                      echo "❌ PM2 app is not running"
                    fi
                  fi

                  # Check SSL certificate
                  if [ -f "/etc/ssl/certs/marinaobuv.ru.crt" ]; then
                    echo "✅ SSL certificate exists"
                  else
                    echo "❌ SSL certificate not found"
                  fi

                  # Check ports
                  if netstat -tlnp | grep -q ":443 "; then
                    echo "✅ Port 443 (HTTPS) is listening"
                  else
                    echo "❌ Port 443 (HTTPS) is not listening"
                  fi

                  if netstat -tlnp | grep -q ":80 "; then
                    echo "✅ Port 80 (HTTP) is listening"
                  else
                    echo "❌ Port 80 (HTTP) is not listening"
                  fi

                  echo "📊 Diagnostics completed"
                  EOF

                  chmod +x run-diagnostics.sh
                  scp run-diagnostics.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/
                  ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "bash /tmp/run-diagnostics.sh"

            - name: Notify deployment status
              if: always()
              run: |
                  if [ "${{ job.status }}" == "success" ]; then
                    echo "🎉 Full stack deployment completed successfully!"
                    echo ""
                    echo "Your site should now be accessible at:"
                    echo "https://marina-obuv.ru"
                    echo "https://www.marina-obuv.ru"
                    echo ""
                    echo "SSL Certificate: /etc/ssl/certs/marinaobuv.ru.crt"
                    echo "SSL Private Key: /etc/ssl/private/marinaobuv.ru.key"
                  else
                    echo "❌ Deployment failed"
                    echo "Check the logs above for details"
                  fi
