# MarinaObuv Cron Jobs (managed by install-crons.sh)
# Each line should end with a unique marker comment for idempotent updates

# Daily DB backup at 03:00 (keeps 3 backups via script retention)
0 3 * * * cd /var/www/marinaobuv/web && export $(grep -v '^#' ./.env | xargs) && /usr/bin/env ./node_modules/.bin/tsx scripts/backup-database.ts >> /var/www/marinaobuv/web/logs/backup.log 2>&1 # JOB:db-backup

# Hourly parsing cron (example; keep if desired)
0 * * * * cd /var/www/marinaobuv/web && NODE_ENV=production /usr/bin/env ./node_modules/.bin/tsx src/scripts/hourly-cron.ts >> /var/www/marinaobuv/web/logs/parsing-cron.log 2>&1 # JOB:parser-hourly


