version: "3.9"

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - web/.env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - VPN_ENABLED=${VPN_ENABLED}
      - VPN_CONFIG_PATH=${VPN_CONFIG_PATH}
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./web:/app
      - /var/www/marinaobuv/web/node_modules:/app/node_modules
    networks:
      - marinaobuv-network

  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - web/.env.production
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - marinaobuv-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - marinaobuv-network

volumes:
  postgres_data:
    driver: local

networks:
  marinaobuv-network:
    driver: bridge
