version: "3.9"

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - web/.env.production
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - /var/www/marinaobuv/web/node_modules:/app/node_modules
    networks:
      - marinaobuv-network

  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - web/.env.production
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marinaobuv
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - marinaobuv-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - marinaobuv-network

volumes:
  postgres_data:
    driver: local

networks:
  marinaobuv-network:
    driver: bridge
