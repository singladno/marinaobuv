<!doctype html>
<html>
  <head>
    <title>SSE Test</title>
  </head>
  <body>
    <h1>SSE Test</h1>
    <div id="status">Connecting...</div>
    <div id="events"></div>

    <script>
      const status = document.getElementById('status');
      const events = document.getElementById('events');

      // Test with a real draft ID from your database
      const draftId = 'cmfr8m8j00029f0ni75h25a1l'; // Replace with actual draft ID

      const eventSource = new EventSource(
        `/api/approval-events?draftId=${draftId}`
      );

      eventSource.onopen = () => {
        status.textContent = 'Connected to SSE';
        status.style.color = 'green';
      };

      eventSource.onmessage = event => {
        const data = JSON.parse(event.data);
        const eventDiv = document.createElement('div');
        eventDiv.textContent = `${new Date().toLocaleTimeString()}: ${JSON.stringify(data)}`;
        events.appendChild(eventDiv);
      };

      eventSource.onerror = error => {
        status.textContent = 'Error: ' + error;
        status.style.color = 'red';
      };
    </script>
  </body>
</html>
